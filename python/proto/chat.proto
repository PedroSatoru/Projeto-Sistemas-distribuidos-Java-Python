syntax = "proto3";

option java_package = "br.ufc.sd.chat.proto";
option java_outer_classname = "ChatProtocol";

message LoginRequest {
  int64 timestamp_ms = 1;
  string username = 2;
}

message LoginResponse {
  int64 timestamp_ms = 1;
  bool success = 2;
  string error = 3;
}

message ListChannelsRequest {
  int64 timestamp_ms = 1;
}

message ListChannelsResponse {
  int64 timestamp_ms = 1;
  repeated string channels = 2;
}

message CreateChannelRequest {
  int64 timestamp_ms = 1;
  string channel_name = 2;
}

message CreateChannelResponse {
  int64 timestamp_ms = 1;
  bool success = 2;
  string error = 3;
}

message ErrorResponse {
  int64 timestamp_ms = 1;
  string error = 2;
}

message PublishRequest {
  int64 timestamp_ms = 1;
  string channel_name = 2;
  string message_text = 3;
  string username = 4;
}

message PublishResponse {
  int64 timestamp_ms = 1;
  bool success = 2;
  string error = 3;
}

message ChatMessage {
  int64 timestamp_ms = 1;
  string channel_name = 2;
  string username = 3;
  string message_text = 4;
  int64 logical_clock = 5;
}

message ClientRequest {
  int64 timestamp_ms = 1;
  oneof action {
    LoginRequest login_request = 2;
    ListChannelsRequest list_channels_request = 3;
    CreateChannelRequest create_channel_request = 4;
    PublishRequest publish_request = 5;
  }
  int64 logical_clock = 6;
}

message ServerResponse {
  int64 timestamp_ms = 1;
  oneof action {
    LoginResponse login_response = 2;
    ListChannelsResponse list_channels_response = 3;
    CreateChannelResponse create_channel_response = 4;
    ErrorResponse error_response = 5;
    PublishResponse publish_response = 6;
  }
  int64 logical_clock = 7;
}

// ---- Reference Service Messages ----

message ReferenceRequest {
  int64 timestamp_ms = 1;
  string action = 2;       // "rank", "list", "heartbeat"
  string server_name = 3;
}

message ServerInfo {
  string name = 1;
  int32 rank = 2;
}

message ReferenceResponse {
  int64 timestamp_ms = 1;
  string action = 2;
  int32 rank = 3;
  repeated ServerInfo servers = 4;
  string status = 5;
  int64 reference_time_ms = 6;
}
