version: '3.8'

services:
  # Broker unico do sistema inteiro (Python) - Parte 1
  broker:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: broker
    command:
      - broker/broker.py
      - --frontend
      - tcp://*:5555
      - --backend
      - tcp://*:5556
    ports:
      - "5555:5555"
      - "5556:5556"
    networks:
      - chat_network

  # Proxy PUB/SUB (Python) - Parte 2
  python_proxy:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_proxy
    command:
      - broker/proxy.py
      - --frontend
      - tcp://*:5557
      - --backend
      - tcp://*:5558
    ports:
      - "5557:5557"
      - "5558:5558"
    networks:
      - chat_network

  # Python Server 1
  python_server_1:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_server_1
    command:
      - server/server.py
      - --backend-endpoint
      - tcp://broker:5556
      - --pub-endpoint
      - tcp://python_proxy:5557
      - --data-file
      - /data/server1_data.json
      - --users-file
      - users.txt
    volumes:
      - ./python/data:/data
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker
      - python_proxy

  # Python Server 2
  python_server_2:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_server_2
    command:
      - server/server.py
      - --backend-endpoint
      - tcp://broker:5556
      - --pub-endpoint
      - tcp://python_proxy:5557
      - --data-file
      - /data/server2_data.json
      - --users-file
      - users.txt
    volumes:
      - ./python/data:/data
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker
      - python_proxy

  # Python Client 1 (Bot 1)
  python_client_1:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_client_1
    command:
      - client/client.py
      - --host
      - broker
      - --port
      - "5555"
      - --sub-host
      - python_proxy
      - --sub-port
      - "5558"
      - --username
      - bot_client_1
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker
      - python_proxy
      - python_server_1
      - python_server_2

  # Python Client 2 (Bot 2)
  python_client_2:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_client_2
    command:
      - client/client.py
      - --host
      - broker
      - --port
      - "5555"
      - --sub-host
      - python_proxy
      - --sub-port
      - "5558"
      - --username
      - bot_client_2
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker
      - python_proxy
      - python_server_1
      - python_server_2

networks:
  chat_network:
    driver: bridge
