version: '3.8'

services:
  # Broker unico do sistema inteiro (Python)
  broker:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: broker
    command:
      - broker/broker.py
      - --frontend
      - tcp://*:5555
      - --backend
      - tcp://*:5556
    ports:
      - "5555:5555"
      - "5556:5556"
    networks:
      - chat_network

  # Proxy PUB/SUB (Python)
  python_proxy:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_proxy
    command:
      - broker/proxy.py
      - --frontend
      - tcp://*:5557
      - --backend
      - tcp://*:5558
    ports:
      - "5557:5557"
      - "5558:5558"
    networks:
      - chat_network

  # Reference Service (Part 3) – clock sync, rank, heartbeat
  python_reference:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_reference
    command:
      - reference/reference.py
      - --endpoint
      - tcp://*:5559
    ports:
      - "5559:5559"
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1

  # Java Server 1
  java_server_1:
    build:
      context: ./java
      dockerfile: Dockerfile
    container_name: java_server_1
    command:
      - ChatServerMain
      - --id
      - java_server_1
      - --backend
      - tcp://broker:5556
      - --pub-endpoint
      - tcp://python_proxy:5557
      - --reference-endpoint
      - tcp://python_reference:5559
      - --users-file
      - /app/users.txt
      - --data-dir
      - /data
    volumes:
      - ./java/data:/data
    networks:
      - chat_network
    depends_on:
      - broker
      - python_proxy
      - python_reference

  # Java Server 2
  java_server_2:
    build:
      context: ./java
      dockerfile: Dockerfile
    container_name: java_server_2
    command:
      - ChatServerMain
      - --id
      - java_server_2
      - --backend
      - tcp://broker:5556
      - --pub-endpoint
      - tcp://python_proxy:5557
      - --reference-endpoint
      - tcp://python_reference:5559
      - --users-file
      - /app/users.txt
      - --data-dir
      - /data
    volumes:
      - ./java/data:/data
    networks:
      - chat_network
    depends_on:
      - broker
      - python_proxy
      - python_reference

  # Java Client 1
  java_client_1:
    build:
      context: ./java
      dockerfile: Dockerfile
    container_name: java_client_1
    command:
      - ChatClientBotMain
      - --username
      - java_bot_1
      - --frontend
      - tcp://broker:5555
      - --sub-endpoint
      - tcp://python_proxy:5558
      - --login-attempts
      - "3"
    networks:
      - chat_network
    depends_on:
      - broker
      - python_proxy
      - java_server_1
      - java_server_2
      - python_server_1
      - python_server_2

  # Java Client 2
  java_client_2:
    build:
      context: ./java
      dockerfile: Dockerfile
    container_name: java_client_2
    command:
      - ChatClientBotMain
      - --username
      - java_bot_2
      - --frontend
      - tcp://broker:5555
      - --sub-endpoint
      - tcp://python_proxy:5558
      - --login-attempts
      - "3"
    networks:
      - chat_network
    depends_on:
      - broker
      - python_proxy
      - java_server_1
      - java_server_2
      - python_server_1
      - python_server_2

  # Python Server 1
  python_server_1:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_server_1
    command:
      - server/server.py
      - --backend-endpoint
      - tcp://broker:5556
      - --pub-endpoint
      - tcp://python_proxy:5557
      - --reference-endpoint
      - tcp://python_reference:5559
      - --data-file
      - /data/server1_data.json
      - --users-file
      - users.txt
      - --server-name
      - python_server_1
    volumes:
      - ./python/data:/data
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker
      - python_proxy
      - python_reference

  # Python Server 2
  python_server_2:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_server_2
    command:
      - server/server.py
      - --backend-endpoint
      - tcp://broker:5556
      - --pub-endpoint
      - tcp://python_proxy:5557
      - --reference-endpoint
      - tcp://python_reference:5559
      - --data-file
      - /data/server2_data.json
      - --users-file
      - users.txt
      - --server-name
      - python_server_2
    volumes:
      - ./python/data:/data
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker
      - python_proxy
      - python_reference

  # Python Client 1 (connects to Server 1)
  python_client_1:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_client_1
    command:
      - client/client.py
      - --host
      - broker
      - --port
      - "5555"
      - --sub-host
      - python_proxy
      - --sub-port
      - "5558"
      - --username
      - bot_client_1
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker
      - python_proxy
      - python_server_1
      - python_server_2
      - java_server_1
      - java_server_2

  # Python Client 2 (connects to Server 2)
  python_client_2:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_client_2
    command:
      - client/client.py
      - --host
      - broker
      - --port
      - "5555"
      - --sub-host
      - python_proxy
      - --sub-port
      - "5558"
      - --username
      - bot_client_2
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker
      - python_proxy
      - python_server_1
      - python_server_2
      - java_server_1
      - java_server_2

networks:
  chat_network:
    driver: bridge
