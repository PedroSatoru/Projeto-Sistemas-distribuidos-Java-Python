version: '3.8'

services:
  # Python Server 1
  python_server_1:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_server_1
    command: server/server.py --port 5555 --data-file /data/server1_data.json --users-file users.txt
    ports:
      - "5555:5555"
    volumes:
      - ./python/data:/data
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1

  # Python Server 2
  python_server_2:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_server_2
    command: server/server.py --port 5556 --data-file /data/server2_data.json --users-file users.txt
    ports:
      - "5556:5556"
    volumes:
      - ./python/data:/data
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - python_server_1

  # Python Client 1 (connects to Server 1)
  python_client_1:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_client_1
    command: client/client.py --host python_server_1 --port 5555 --username bot_client_1 --channels "general,random"
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - python_server_1

  # Python Client 2 (connects to Server 2)
  python_client_2:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_client_2
    command: client/client.py --host python_server_2 --port 5556 --username bot_client_2 --channels "announcements,tech"
    networks:
      - chat_network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - python_server_2

networks:
  chat_network:
    driver: bridge
